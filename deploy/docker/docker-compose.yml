version: '3.8'

services:
  # Database Layer
  postgres:
    image: postgres:16-alpine
    container_name: aimedia-db
    environment:
      POSTGRES_USER: aimedia_user
      POSTGRES_PASSWORD: aimedia_secure_password
      POSTGRES_DB: aimedia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../db/migrations:/docker-entrypoint-initdb.d
    command: postgres -c shared_buffers=64MB -c max_connections=20
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimedia_user -d aimedia_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Message Broker Layer (Apache Kafka in KRaft Mode)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: aimedia-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 600M
        reservations:
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Object Storage Layer (S3-compatible — MinIO)
  minio:
    image: minio/minio:latest
    container_name: aimedia-storage
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpass
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Bucket initialization (runs once, then exits)
  minio-init:
    image: minio/mc:latest
    container_name: aimedia-storage-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadminpass &&
      mc mb local/evidence-packs --ignore-existing &&
      mc policy set download local/evidence-packs &&
      echo 'Bucket evidence-packs ready'
      "
    restart: "no"

  # Go API Gateway Layer
  go-api:
    build:
      context: ../../api-gateway
      dockerfile: Dockerfile
    container_name: aimedia-api-gateway
    ports:
      - "8080:8080"
    environment:
      # Server
      PORT: 8080
      ENV: development
      GOMAXPROCS: 1
      # PostgreSQL
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: aimedia_user
      DB_PASSWORD: aimedia_secure_password
      DB_NAME: aimedia_db
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONNS: 10
      DB_MAX_IDLE_CONNS: 5
      # Kafka
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: go-api-consumer
      KAFKA_TOPIC_JOB_CREATED: media.job.created
      KAFKA_TOPIC_JOB_COMPLETED: media.job.completed
      # Auth
      JWT_SECRET: change-me-in-production
      JWT_EXPIRY_HOURS: 24
      GO_API_INTERNAL_TOKEN: internal-service-token-change-me
      # S3 / MinIO
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadminpass
      S3_BUCKET_NAME: evidence-packs
      S3_USE_SSL: "false"
      S3_SIGNED_URL_EXPIRY_HOURS: 168
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 100M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Python Media Worker Layer
  python-worker:
    build:
      context: ../../media-worker
      dockerfile: Dockerfile
    container_name: aimedia-media-worker
    environment:
      # Kafka
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: python-worker-consumer
      KAFKA_TOPIC_JOB_CREATED: media.job.created
      KAFKA_TOPIC_JOB_COMPLETED: media.job.completed
      # Go API (status sync)
      GO_API_BASE_URL: http://go-api:8080
      GO_API_INTERNAL_TOKEN: internal-service-token-change-me
      # External AI APIs (pass from host env, fall back to mock)
      SONIOX_API_KEY: ${SONIOX_API_KEY:-mock_key}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-mock_key}
      GEMINI_MODEL: gemini-1.5-flash-latest
      # S3 / MinIO
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadminpass
      S3_BUCKET_NAME: evidence-packs
      S3_USE_SSL: "false"
      # Processing
      TMP_DIR: /tmp/mediawatch-jobs
      MAX_VIDEO_DURATION_SECONDS: 600
      KEYFRAME_INTERVAL_SECONDS: 3
      KEYFRAME_MAX_WIDTH_PX: 800
      AUDIO_SAMPLE_RATE_HZ: 16000
      EVIDENCE_RISK_THRESHOLD: 70
      # Gemini rate limiting
      GEMINI_MAX_RETRIES: 3
      GEMINI_RETRY_BACKOFF_BASE_SECONDS: 2
    volumes:
      - /tmp/mediawatch-jobs:/tmp/mediawatch-jobs
    deploy:
      resources:
        limits:
          memory: 450M
        reservations:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      go-api:
        condition: service_started
    restart: unless-stopped

  # Routing & Frontend serving Layer (Nginx + React/Vite)
  react-frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: aimedia-frontend
    ports:
      - "80:80"
    depends_on:
      - go-api
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  kafka_data:
    driver: local
  minio_data:
    driver: local
